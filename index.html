<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HERITAGE - TOHO HOUSE NERIMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body class="bg-black text-white font-serif">

    <div class="max-w-3xl mx-auto py-12 px-6">
        <header class="mb-12 border-b border-gray-700 pb-6 text-center">
            <h1 class="text-4xl tracking-widest font-bold">THE HERITAGE</h1>
            <p class="text-gray-400 mt-2 text-sm italic uppercase tracking-tighter">A very COOL every LIFE!</p>
        </header>

        <section class="space-y-8 bg-gray-900 p-8 rounded-lg border border-gray-800">
            <div>
                <label class="block text-xs text-gray-500 mb-1 uppercase tracking-widest">Gemini API Key</label>
                <input type="password" id="apiKey" class="w-full bg-black border border-gray-700 p-3 rounded text-white text-sm focus:border-white outline-none transition" placeholder="Enter your API Key...">
            </div>

            <div>
                <label class="block text-xs text-gray-500 mb-1 uppercase tracking-widest">Object Images / Sales Drawings</label>
                <input type="file" id="imageInput" accept="image/*" multiple class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-gray-700 file:text-white hover:file:bg-gray-600 transition cursor-pointer">
            </div>

            <button onclick="generatePamphlet()" id="btn" class="w-full bg-white text-black font-bold py-4 rounded hover:bg-gray-200 transition uppercase tracking-widest shadow-lg">
                CREATE MAG-STYLE PPTX
            </button>
        </section>

        <div id="status" class="mt-8 text-center text-xs text-gray-500 tracking-widest h-8 overflow-hidden"></div>
    </div>

    <script>
        async function generatePamphlet() {
            const key = document.getElementById('apiKey').value;
            const files = document.getElementById('imageInput').files;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');

            if (!key || files.length === 0) return alert("API Keyと画像を選択してください");

            btn.disabled = true;
            status.innerText = "東宝ハウスの美学をAIに同期中... 魂を込めて執筆しています。";

            try {
                const file = files[0];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];

                    // あなたの環境で動作が確認された「gemini-3-flash-preview」を使用
                    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;

                    // プロンプトを大幅に修正：テキストだけでなく、表紙画像生成用のプロンプトも要求する
                    const prompt = `
                        あなたは東宝ハウス練馬のクリエイティブディレクターです。
                        送られた物件資料（1枚目の画像）から情報を抽出し、必ず以下のJSON形式のみで出力してください。

                        {
                          "title": "成功者の孤独や静寂を表現する、英語のキザなタイトル（例: THE ABSOLUTE SILENCE）",
                          "catchphrase": "日本語で、その家でのドラマを感じさせるクールな一言（例: 練馬で、大人の隠れ家を楽しむ。）",
                          "description": "300字程度の、スペックを語らず感性に訴える紹介文。トーンは圧倒的な優越感。",
                          "cover_image_prompt": "この物件の雰囲気（優越感、静寂、美学）に合致する、高級ライフスタイル雑誌の表紙を飾るような、人物（例：ソファに座り寛ぐスタイリッシュな男性）または洗練されたインテリア（例：光が差し込むミニマルなリビング）の画像生成用プロンプト（英語）。"
                        }
                    `;

                    // 1. まずテキストと画像プロンプトを生成
                    const textResponse = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: file.type, data: base64Data } }
                                ]
                            }]
                        })
                    });

                    if (!textResponse.ok) {
                        const err = await textResponse.json();
                        throw new Error("テキスト生成エラー: " + err.error.message);
                    }

                    const textData = await textResponse.json();
                    const aiText = textData.candidates[0].content.parts[0].text;
                    const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("AIの応答形式が正しくありません。");
                    const data = JSON.parse(jsonMatch[0]);

                    // 2. 生成されたプロンプトを使って表紙画像を生成
                    status.innerText = "雑誌の表紙を飾る、至高の瞬間をAIが描画中...";
                    
                    // Playgroundで確認できたモデルIDリストを参考に、画像生成に対応したモデルID（仮）をセット
                    // 実際の画像生成エンドポイントやモデルIDは環境により異なる可能性がありますが、ここではリストにあったIDを参考に記述します
                    const imageEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${key}`;

                    const imageResponse = await fetch(imageEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: data.cover_image_prompt + " --aspect 9:16 --v 6.0" } // 雑誌風にするため縦長を模倣
                                ]
                            }]
                        })
                    });

                    if (!imageResponse.ok) {
                        const err = await imageResponse.json();
                        throw new Error("画像生成エラー: " + err.error.message);
                    }

                    const imageData = await imageResponse.json();
                    const generatedBase64 = imageData.candidates[0].content.parts[0].inlineData.data;
                    const coverImageUrl = `data:image/png;base64,${generatedBase64}`;

                    // 3. 生成されたテキストと画像を使ってパワポを生成
                    createPPTX(data, coverImageUrl, reader.result);
                    
                    status.innerText = "美学が形になりました。ダウンロードを開始します。";
                    btn.disabled = false;
                };

            } catch (e) {
                console.error(e);
                status.innerText = "エラー: " + e.message;
                btn.disabled = false;
            }
        }

        function createPPTX(aiData, coverImage, originalImage) {
            let pptx = new PptxGenJS();
            
            // スライド1: 表紙（雑誌風）
            let slide1 = pptx.addSlide();
            slide1.background = { color: "FFFFFF" }; // 雑誌風なので白背景

            // AIが生成した表紙画像（全面）
            slide1.addImage({ data: coverImage, x: 0, y: 0, w: "100%", h: "100%" });

            // タイトル（Georgia：高級感のあるセリフ体、最上部に配置）
            slide1.addText(aiData.title, {
                x: 0.5, y: 0.5, w: 9, fontSize: 60, color: "FFFFFF", bold: true, fontFace: "Georgia", charSpacing: 2
            });

            // ロゴ代わりのテキスト（最上部：ブランドの象徴）
            slide1.addText("THE NERIMA COLLECTIVE", {
                x: 0.5, y: 1.2, fontSize: 12, color: "FFFFFF", bold: true, charSpacing: 1
            });

            // キャッチコピー（MS Mincho：日本語の静寂と重厚感を演出、中央に配置）
            slide1.addText(aiData.catchphrase, {
                x: 0.5, y: 3.5, w: 9, fontSize: 32, color: "FFFFFF", fontFace: "MS Mincho", bold: true, align: "center"
            });

            // 説明文（行間を広めにして雑誌のような「読ませる」レイアウトに、下部に配置）
            slide1.addText(aiData.description, {
                x: 0.5, y: 7.0, w: 6, fontSize: 12, color: "FFFFFF", fontFace: "MS Mincho", lineSpacing: 24, align: "left"
            });

            // 最下部のブランド表記
            slide1.addText("TOHO HOUSE NERIMA PRESENTS | VOL. 01", {
                x: 0.5, y: 9.2, fontSize: 10, color: "FFFFFF", bold: true, align: "center"
            });

            // スライド2: 物件詳細（元の販売図面を配置）
            let slide2 = pptx.addSlide();
            slide2.background = { color: "000000" };
            slide2.addImage({ data: originalImage, x: 0, y: 0, w: "100%", h: "100%", opacity: 0.8 });
            slide2.addText("OBJECT DETAILS", {
                x: 0.5, y: 0.5, w: 9, fontSize: 36, color: "FFFFFF", bold: true, fontFace: "Georgia"
            });

            pptx.writeFile({ fileName: `HERITAGE_MAG_STYLE_${Date.now()}.pptx` });
        }
    </script>
</body>
</html>
