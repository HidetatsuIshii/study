<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HERITAGE - TOHO HOUSE NERIMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body class="bg-black text-white font-serif">

    <div class="max-w-3xl mx-auto py-12 px-6">
        <header class="mb-12 border-b border-gray-700 pb-6 text-center">
            <h1 class="text-4xl tracking-widest font-bold">THE HERITAGE</h1>
            <p class="text-gray-400 mt-2 text-sm italic uppercase tracking-tighter">A very COOL every LIFE!</p>
        </header>

        <section class="space-y-8 bg-gray-900 p-8 rounded-lg border border-gray-800 shadow-2xl">
            <div>
                <label class="block text-xs text-gray-500 mb-1 uppercase tracking-widest text-center">Gemini API Key</label>
                <input type="password" id="apiKey" class="w-full bg-black border border-gray-700 p-3 rounded text-white text-center text-sm focus:border-white outline-none transition" placeholder="Paste your API Key here">
            </div>

            <div>
                <label class="block text-xs text-gray-500 mb-1 uppercase tracking-widest text-center">Object Image / Sales Drawing</label>
                <input type="file" id="imageInput" accept="image/*" class="w-full text-xs text-center text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-gray-800 file:text-white hover:file:bg-gray-700 transition cursor-pointer">
            </div>

            <button onclick="generatePamphlet()" id="btn" class="w-full bg-white text-black font-bold py-5 rounded hover:bg-gray-200 transition uppercase tracking-[0.2em] text-sm shadow-inner">
                GENERATE MAG-STYLE PROPOSAL
            </button>

            <div id="progressArea" class="hidden space-y-3">
                <div class="w-full bg-gray-800 h-1 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-white h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <div id="statusLabel" class="text-center text-[10px] text-gray-400 tracking-widest uppercase italic">Initializing...</div>
            </div>
        </section>

        <div id="errorDisplay" class="mt-8 text-center text-xs text-red-500 leading-relaxed font-sans px-4"></div>
    </div>

    <script>
        async function generatePamphlet() {
            const key = document.getElementById('apiKey').value;
            const file = document.getElementById('imageInput').files[0];
            const btn = document.getElementById('btn');
            const progressArea = document.getElementById('progressArea');
            const progressBar = document.getElementById('progressBar');
            const statusLabel = document.getElementById('statusLabel');
            const errorDisplay = document.getElementById('errorDisplay');

            if (!key || !file) return alert("API Keyと画像を選択してください");

            // UIリセット
            btn.disabled = true;
            btn.style.opacity = "0.5";
            progressArea.classList.remove('hidden');
            errorDisplay.innerText = "";
            updateProgress(10, "Analyzing Property Data...");

            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    // あなたの環境で動作が確認された「Gemini 2.0 Flash」を使用
                    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;

                    // STEP 1: テキスト分析と画像プロンプト生成
                    updateProgress(30, "AI Director is writing copy...");
                    const textResponse = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: "あなたは東宝ハウス練馬のクリエイティブディレクターです。画像から情報を読み取り、キザな英語題名、日本語キャッチ、300字ポエム、そして表紙画像用の英語プロンプトをJSON形式で出力して。 { \"title\": \"...\", \"catchphrase\": \"...\", \"description\": \"...\", \"image_prompt\": \"...\" } トーンは圧倒的な優越感。平凡な説明（日当たり、駅近など）は禁止。" },
                                { inlineData: { mimeType: file.type, data: base64Data } }
                            ]}]
                        })
                    });

                    if (!textResponse.ok) {
                        const err = await textResponse.json();
                        throw new Error("テキスト生成エラー: " + err.error.message);
                    }

                    const textData = await textResponse.json();
                    const aiText = textData.candidates[0].content.parts[0].text;
                    const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("AIの応答形式が正しくありません。");
                    const data = JSON.parse(jsonMatch[0]);

                    // STEP 2: 画像生成
                    updateProgress(60, "Gemini is painting cover image...");
                    
                    // 画像生成（image-preview）に対応したモデルID（仮）をセット
                    const endpointImage = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${key}`;
                    
                    const imageResponse = await fetch(endpointImage, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: data.image_prompt + " Luxury apartment magazine cover style, high-end photography --aspect 9:16 --v 6.0" }] }] // 雑誌風にするため縦長を模倣
                        })
                    });

                    if (!imageResponse.ok) {
                        const err = await imageResponse.json();
                        throw new Error("画像生成エラー: " + err.error.message);
                    }

                    const imageData = await imageResponse.json();
                    const coverBase64 = imageData.candidates[0].content.parts[0].inlineData.data;

                    // STEP 3: パワポ生成
                    updateProgress(90, "Assembling Powerpoint slides...");
                    createPPTX(data, `data:image/png;base64,${coverBase64}`, reader.result);

                    updateProgress(100, "COMPLETED. Check your downloads.");
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.style.opacity = "1";
                        progressArea.classList.add('hidden');
                    }, 3000);

                } catch (e) {
                    handleError(e);
                }
            } catch (e) {
                handleError(e);
            }
        }

        function updateProgress(percent, text) {
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('statusLabel').innerText = text;
        }

        function handleError(err) {
            const errorDisplay = document.getElementById('errorDisplay');
            const btn = document.getElementById('btn');
            const progressArea = document.getElementById('progressArea');
            
            console.error(err);
            let msg = "Error: " + (err.error?.message || "Unknown Error");
            
            if (msg.includes("Quota exceeded") || msg.includes("429")) {
                msg = "【制限エラー】APIの回数制限を超えました。無料枠のため、15〜30秒ほど待ってからもう一度お試しください。";
            }
            
            errorDisplay.innerText = msg;
            btn.disabled = false;
            btn.style.opacity = "1";
            progressArea.classList.add('hidden');
        }

        function createPPTX(aiData, coverImage, originalImage) {
            let pptx = new PptxGenJS();
            
            // スライド1: 雑誌風表紙（雑誌風画像全面、タイポグラフィ）
            let slide1 = pptx.addSlide();
            slide1.background = { color: "FFFFFF" }; // 雑誌風なので白背景
            slide1.addImage({ data: coverImage, x: 0, y: 0, w: "100%", h: "100%" });
            
            // デザイン要素（Georgia：高級感のあるセリフ体）
            slide1.addText(aiData.title, {
                x: 0.5, y: 0.5, w: 9, fontSize: 60, color: "FFFFFF", bold: true, fontFace: "Georgia", charSpacing: 2
            });

            // ロゴ代わりのテキスト
            slide1.addText("THE NERIMA COLLECTIVE", {
                x: 0.5, y: 1.2, fontSize: 12, color: "FFFFFF", bold: true, charSpacing: 1
            });

            // キャッチコピー（MS Mincho：日本語の静寂と重厚感を演出、中央に配置）
            slide1.addText(aiData.catchphrase, {
                x: 0.5, y: 3.5, w: 9, fontSize: 32, color: "FFFFFF", fontFace: "MS Mincho", bold: true, align: "center"
            });

            // 説明文（雑誌のような「読ませる」レイアウトに、下部に配置）
            slide1.addText(aiData.description, {
                x: 0.5, y: 7.0, w: 6, fontSize: 12, color: "FFFFFF", fontFace: "MS Mincho", lineSpacing: 24, align: "left"
            });

            // 最下部のブランド表記
            slide1.addText("TOHO HOUSE NERIMA PRESENTS | VOL. 01", {
                x: 0.5, y: 9.2, fontSize: 10, color: "FFFFFF", bold: true, align: "center"
            });

            // スライド2: 元の図面（OBJECT DETAILSとして配置）
            let slide2 = pptx.addSlide();
            slide2.background = { color: "000000" };
            slide2.addImage({ data: originalImage, x: 0, y: 0, w: "100%", h: "100%", opacity: 0.8 });
            slide2.addText("OBJECT DETAILS", {
                x: 0.5, y: 0.5, w: 9, fontSize: 36, color: "FFFFFF", bold: true, fontFace: "Georgia"
            });

            pptx.writeFile({ fileName: `TOHO_STYLISH_PROPOSAL_${Date.now()}.pptx` });
        }
    </script>
</body>
</html>
